<svg
  width="1600"
  height="1000"
  viewBox="0 0 1600 1000"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <rect width="1600" height="1000" fill="#07090B" />
  <rect x="170" y="115" width="1260" height="770" rx="18" fill="#0B1115" />
  <rect x="170" y="115" width="1260" height="58" rx="18" fill="#101820" />
  <rect x="170" y="155" width="1260" height="18" fill="#101820" />
  <rect x="210" y="137" width="116" height="14" rx="7" fill="#4EC9B0" opacity=".32" />
  <rect x="350" y="137" width="148" height="14" rx="7" fill="#9CDCFE" opacity=".24" />
  <rect x="1250" y="137" width="112" height="14" rx="7" fill="#11D9E8" opacity=".2" />

  <g opacity=".5">
    <path d="M248 246H1352" stroke="#21343C" />
    <path d="M248 304H1352" stroke="#21343C" />
    <path d="M248 362H1352" stroke="#21343C" />
    <path d="M248 420H1352" stroke="#21343C" />
    <path d="M248 478H1352" stroke="#21343C" />
    <path d="M248 536H1352" stroke="#21343C" />
    <path d="M248 594H1352" stroke="#21343C" />
    <path d="M248 652H1352" stroke="#21343C" />
    <path d="M248 710H1352" stroke="#21343C" />
    <path d="M248 768H1352" stroke="#21343C" />
  </g>

  <g font-family="Consolas, 'SFMono-Regular', Menlo, monospace" font-size="29" letter-spacing=".2">
    <text x="244" y="248" fill="#6A9955" opacity=".76">// build the public project index</text>
    <text x="244" y="306" fill="#C586C0" opacity=".82">export</text>
    <text x="350" y="306" fill="#C586C0" opacity=".82">async</text>
    <text x="454" y="306" fill="#C586C0" opacity=".82">function</text>
    <text x="600" y="306" fill="#DCDCAA" opacity=".86">getProjects</text>
    <text x="770" y="306" fill="#D4D4D4" opacity=".72">() {</text>

    <text x="292" y="364" fill="#C586C0" opacity=".8">const</text>
    <text x="382" y="364" fill="#9CDCFE" opacity=".86">payload</text>
    <text x="512" y="364" fill="#D4D4D4" opacity=".66">=</text>
    <text x="552" y="364" fill="#C586C0" opacity=".8">await</text>
    <text x="660" y="364" fill="#DCDCAA" opacity=".84">getPayload</text>
    <text x="822" y="364" fill="#D4D4D4" opacity=".68">({ config });</text>

    <text x="292" y="422" fill="#C586C0" opacity=".8">return</text>
    <text x="410" y="422" fill="#C586C0" opacity=".8">await</text>
    <text x="520" y="422" fill="#9CDCFE" opacity=".86">payload</text>
    <text x="650" y="422" fill="#D4D4D4" opacity=".66">.</text>
    <text x="668" y="422" fill="#DCDCAA" opacity=".84">find</text>
    <text x="740" y="422" fill="#D4D4D4" opacity=".68">({</text>

    <text x="340" y="480" fill="#9CDCFE" opacity=".86">collection</text>
    <text x="514" y="480" fill="#D4D4D4" opacity=".66">:</text>
    <text x="548" y="480" fill="#CE9178" opacity=".82">'projects'</text>
    <text x="706" y="480" fill="#D4D4D4" opacity=".66">,</text>

    <text x="340" y="538" fill="#9CDCFE" opacity=".86">depth</text>
    <text x="442" y="538" fill="#D4D4D4" opacity=".66">:</text>
    <text x="478" y="538" fill="#B5CEA8" opacity=".8">1</text>
    <text x="498" y="538" fill="#D4D4D4" opacity=".66">,</text>
    <text x="548" y="538" fill="#9CDCFE" opacity=".86">sort</text>
    <text x="628" y="538" fill="#D4D4D4" opacity=".66">:</text>
    <text x="662" y="538" fill="#CE9178" opacity=".82">'-createdAt'</text>
    <text x="858" y="538" fill="#D4D4D4" opacity=".66">,</text>

    <text x="340" y="596" fill="#9CDCFE" opacity=".86">where</text>
    <text x="442" y="596" fill="#D4D4D4" opacity=".68">: {</text>
    <text x="504" y="596" fill="#9CDCFE" opacity=".86">_status</text>
    <text x="634" y="596" fill="#D4D4D4" opacity=".68">: {</text>
    <text x="692" y="596" fill="#9CDCFE" opacity=".86">equals</text>
    <text x="812" y="596" fill="#D4D4D4" opacity=".66">:</text>
    <text x="846" y="596" fill="#CE9178" opacity=".82">'published'</text>
    <text x="1048" y="596" fill="#D4D4D4" opacity=".68">} },</text>

    <text x="292" y="654" fill="#D4D4D4" opacity=".68">});</text>
    <text x="244" y="712" fill="#D4D4D4" opacity=".72">}</text>

    <text x="244" y="804" fill="#4EC9B0" opacity=".72">type</text>
    <text x="326" y="804" fill="#4EC9B0" opacity=".78">ProjectCardProps</text>
    <text x="594" y="804" fill="#D4D4D4" opacity=".66">= {</text>
    <text x="660" y="804" fill="#9CDCFE" opacity=".82">priority</text>
    <text x="806" y="804" fill="#D4D4D4" opacity=".66">:</text>
    <text x="840" y="804" fill="#4EC9B0" opacity=".78">boolean</text>
    <text x="952" y="804" fill="#D4D4D4" opacity=".66">};</text>
  </g>

  <radialGradient
    id="glow"
    cx="0"
    cy="0"
    r="1"
    gradientUnits="userSpaceOnUse"
    gradientTransform="translate(1030 430) rotate(90) scale(430 620)"
  >
    <stop stop-color="#11D9E8" stop-opacity=".24" />
    <stop offset="1" stop-color="#11D9E8" stop-opacity="0" />
  </radialGradient>
  <rect width="1600" height="1000" fill="url(#glow)" />
  <rect x="170" y="115" width="1260" height="770" rx="18" stroke="#8AEAF2" stroke-opacity=".08" />
</svg>
